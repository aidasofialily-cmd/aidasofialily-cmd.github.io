<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page not found</title>
  <style>
    body {
      background-color: #fdfdfd;
      color: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.5;
      margin: 0;
      padding: 0;
    }

    .wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 80px 20px;
    }

    header {
      border-bottom: 1px solid #e8e8e8;
      margin-bottom: 40px;
      padding-bottom: 20px;
    }

    .site-title {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: -1px;
      color: #828282;
      text-decoration: none;
    }

    h1 {
      font-family: "PT Serif", Georgia, serif;
      font-size: 42px;
      font-weight: 400;
      margin-top: 0;
    }

    p {
      font-size: 18px;
      color: #424242;
    }

    .action-link {
      color: #2a7ae2; /* Signature Minima Blue */
      text-decoration: none;
    }

    .action-link:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 80px;
      padding-top: 20px;
      border-top: 1px solid #e8e8e8;
      font-size: 14px;
      color: #828282;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <header>
      <a href="/" class="site-title">aidasofialily-cmd.github.io</a>
    </header>

    <main>
      <h1>404</h1>
      <p><strong>Page not found</strong></p>
      <p>The requested page could not be found. You may have typed the address incorrectly, or the page may have been moved.</p>
      <p>
        Please try heading back to the <a href="/" class="action-link">home page</a> to find what you're looking for.
      </p>
    </main>

    <footer>
      <span>&copy; 2026 aidasofialily-cmd</span>
    </footer>
  </div>

</body>
</html>
